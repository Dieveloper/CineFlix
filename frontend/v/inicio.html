<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlix</title>
    <link rel="stylesheet" href="../css/inicio.css">
</head>
<body>
        <div class="hero">
            <div class="hero-badge">★ DESTACADO HOY</div>
            <div class="hero-title">DARK ODYSSEY</div>
            <div class="hero-desc">Un agente secreto descubre que la realidad que conoce no es más que una simulación. 2024 · Acción · Sci-Fi</div>
            <div class="hero-btns">
                <button class="btn-play">▶ Reproducir</button>
                <button class="btn-info">ⓘ Más info</button>
            </div>
        </div>

        <div class="catalog">
            <div class="row">
                <div class="row-title">Tendencias ahora <span>Ver todo →</span></div>
                <div class="cards-scroll" id="row-trending"></div>
            </div>
            <div class="row">
                <div class="row-title">Series populares <span>Ver todo →</span></div>
                <div class="cards-scroll" id="row-series"></div>
            </div>
            <div class="row">
                <div class="row-title">Películas de acción <span>Ver todo →</span></div>
                <div class="cards-scroll" id="row-action"></div>
            </div>
            <div class="row">
                <div class="row-title">Documentales <span>Ver todo →</span></div>
                <div class="cards-scroll" id="row-docs"></div>
            </div>
        </div>
    </div>

    <!-- MODAL GESTIONAR PERFILES -->
    <div id="modal-gestionar-perfiles" class="modal-perfiles">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Gestionar Perfiles</h3>
                <button class="modal-close" onclick="cerrarGestionarPerfiles()">&times;</button>
            </div>
            <div id="lista-perfiles-modal"></div>
            <button class="crear-perfil-btn" onclick="mostrarFormCrearPerfil()">+ Añadir nuevo perfil</button>
            <div id="form-crear-perfil" class="form-crear-perfil">
                <input type="text" id="nuevo-perfil-nombre" placeholder="Nombre del perfil" />
                <button class="btn-crear" onclick="crearNuevoPerfil()">Crear</button>
                <button class="btn-cancelar" onclick="ocultarFormCrearPerfil()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../js/inicio.js"></script>
</body>
</html>
